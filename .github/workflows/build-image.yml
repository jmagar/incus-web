name: Build Incus image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-image.yml
      - deploy.sh
      - distrobuilder.yaml
      - incus-web-profile.yaml
      - scripts/build-image.sh
      - scripts/incus-web-lib.sh
      - scripts/smoke-image.sh
      - tests/deploy_static_tests.sh
      - apps/web/**
  pull_request:
    paths:
      - .github/workflows/build-image.yml
      - deploy.sh
      - distrobuilder.yaml
      - incus-web-profile.yaml
      - scripts/build-image.sh
      - scripts/incus-web-lib.sh
      - scripts/smoke-image.sh
      - tests/deploy_static_tests.sh
      - apps/web/**

permissions:
  contents: write

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Lint web app
        run: npm --prefix apps/web run lint

      - name: Test web app
        run: npm --prefix apps/web run test

      - name: Build web app
        run: npm --prefix apps/web run build

  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck debootstrap squashfs-tools
          sudo snap install distrobuilder --classic

      - name: Validate scripts
        run: |
          bash tests/deploy_static_tests.sh
          bash -n deploy.sh scripts/incus-web-lib.sh scripts/build-image.sh scripts/smoke-image.sh tests/deploy_static_tests.sh
          shellcheck deploy.sh scripts/incus-web-lib.sh scripts/build-image.sh scripts/smoke-image.sh tests/deploy_static_tests.sh

      - name: Install Incus
        run: |
          if ! command -v incus >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y incus uidmap squashfs-tools
          fi
          sudo incus admin init --minimal || true

      - name: Build and export image
        run: sudo -E ./scripts/build-image.sh
        env:
          EXPORT_DIR: ${{ github.workspace }}/dist
          IMAGE_ALIAS: incus-web-agent
          DISTROBUILDER_YAML: ${{ github.workspace }}/distrobuilder.yaml

      - name: Smoke test exported image
        run: sudo -E ./scripts/smoke-image.sh
        env:
          EXPORT_DIR: ${{ github.workspace }}/dist
          IMAGE_ALIAS: incus-web-agent

      - name: Upload Incus image artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: incus-web-agent-image
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish rolling latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: incus-web-agent-latest
          RELEASE_TITLE: incus-web-agent latest
        run: |
          set -euo pipefail

          release_notes="$(mktemp)"
          cat >"$release_notes" <<EOF
          Rolling Incus image build from \`${GITHUB_SHA}\`.

          - Repository: ${GITHUB_REPOSITORY}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Source branch: ${GITHUB_REF_NAME}
          EOF

          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push -f origin "$RELEASE_TAG"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$release_notes" \
              --latest
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TITLE" \
              --notes-file "$release_notes" \
              --latest
          fi
