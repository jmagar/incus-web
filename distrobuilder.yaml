image:
  name: incus-web-agent
  distribution: debian
  release: trixie
  architecture: x86_64
  description: |-
    incus-web agent image built from Debian {{ image.release }}

source:
  downloader: debootstrap
  url: http://deb.debian.org/debian
  keyserver: keyserver.ubuntu.com
  keys:
    - 0xB8B80B5B623EAB6AD8775C45B7C5D7D6350947F8
    - 0x6ED0E7B82643E131
  components:
    - main

mappings:
  architecture_map: debian

files:
  - path: /etc/hostname
    generator: hostname

  - path: /etc/hosts
    generator: hosts

  - path: /etc/machine-id
    generator: dump
    content: ""

  - path: /var/lib/dbus/machine-id
    generator: remove

  - path: /usr/local/bin/agent-env
    generator: dump
    mode: 0755
    content: |-
      #!/usr/bin/env bash
      set -euo pipefail

      export HOME=/home/agent
      export USER=agent
      export LOGNAME=agent
      export PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.local/bin:$PATH"

      cd /workspace 2>/dev/null || cd "$HOME"
      exec "$@"

  - path: /etc/systemd/system/wetty.service
    generator: dump
    mode: 0644
    content: |-
      [Unit]
      Description=WeTTY browser terminal
      After=network-online.target
      Wants=network-online.target

      [Service]
      Environment=HOME=/home/agent
      ExecStart=/usr/local/bin/wetty --host 127.0.0.1 --port 3000 --base / --command 'runuser -u agent -- /usr/bin/zsh -l'
      Restart=always
      RestartSec=2

      [Install]
      WantedBy=multi-user.target

packages:
  manager: apt
  update: true
  cleanup: true
  sets:
    - action: install
      packages:
        - bash
        - build-essential
        - ca-certificates
        - cargo
        - curl
        - git
        - golang-go
        - gnupg
        - jq
        - libssl-dev
        - netcat-openbsd
        - pkg-config
        - python3
        - python3-pip
        - python3-venv
        - rustc
        - sudo
        - unzip
        - zip
        - zsh

actions:
  - trigger: post-packages
    action: |-
      #!/bin/sh
      set -eu

      export DEBIAN_FRONTEND=noninteractive

      cat >/usr/local/bin/agent-env <<'EOF'
      #!/usr/bin/env bash
      set -euo pipefail

      export HOME=/home/agent
      export USER=agent
      export LOGNAME=agent
      export PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.local/bin:$PATH"

      cd /workspace 2>/dev/null || cd "$HOME"
      exec "$@"
      EOF
      chmod 755 /usr/local/bin/agent-env

      install -d -m 755 /etc/systemd/system
      cat >/etc/systemd/system/wetty.service <<'EOF'
      [Unit]
      Description=WeTTY browser terminal
      After=network-online.target
      Wants=network-online.target

      [Service]
      Environment=HOME=/home/agent
      ExecStart=/usr/local/bin/wetty --host 127.0.0.1 --port 3000 --base / --command 'runuser -u agent -- /usr/bin/zsh -l'
      Restart=always
      RestartSec=2

      [Install]
      WantedBy=multi-user.target
      EOF
      sed -i 's/^      //' /usr/local/bin/agent-env /etc/systemd/system/wetty.service
      chmod 755 /usr/local/bin/agent-env

      if ! command -v npm >/dev/null 2>&1; then
        node_arch="$(dpkg --print-architecture)"
        case "$node_arch" in
          amd64) node_arch="x64" ;;
          arm64) node_arch="arm64" ;;
          *) echo "unsupported Node architecture: $node_arch" >&2; exit 1 ;;
        esac
        node_base="https://nodejs.org/dist/latest-v22.x"
        node_file="$(curl -fsSL "$node_base/SHASUMS256.txt" | awk -v arch="linux-$node_arch.tar.xz" '$2 ~ arch { print $2; exit }')"
        if [ -z "$node_file" ]; then
          echo "could not resolve Node archive for $node_arch" >&2
          exit 1
        fi
        tmp_dir="$(mktemp -d)"
        curl -fsSLo "$tmp_dir/$node_file" "$node_base/$node_file"
        curl -fsSL "$node_base/SHASUMS256.txt" | grep "  $node_file\$" >"$tmp_dir/SHASUMS256.txt"
        (cd "$tmp_dir" && sha256sum -c SHASUMS256.txt)
        tar -C /usr/local --strip-components=1 -xJf "$tmp_dir/$node_file"
        rm -rf "$tmp_dir"
      fi

      if ! command -v gh >/dev/null 2>&1; then
        mkdir -p /etc/apt/keyrings
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
          | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
        chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
          >/etc/apt/sources.list.d/github-cli.list
        apt-get update
        apt-get install -y gh
      fi

      if ! command -v tailscale >/dev/null 2>&1; then
        curl -fsSL https://tailscale.com/install.sh | sh
      fi

      cat >/etc/default/tailscaled <<'EOF'
      PORT="41641"
      FLAGS="--tun=userspace-networking"
      EOF
      sed -i 's/^      //' /etc/default/tailscaled

      if ! command -v claude >/dev/null 2>&1; then
        npm install -g @anthropic-ai/claude-code
      fi

      if ! command -v wetty >/dev/null 2>&1; then
        npm install -g wetty
      fi

      if ! command -v ghostty-web-demo >/dev/null 2>&1; then
        npm install -g @ghostty-web/demo@0.4.0-next.20.g1858a59
      fi

      if ! id -u agent >/dev/null 2>&1; then
        useradd -m -s /usr/bin/zsh agent
      fi
      usermod -s /usr/bin/zsh agent

      install -d -o agent -g agent /workspace
      usermod -aG sudo agent
      printf '%s ALL=(ALL) NOPASSWD:ALL\n' agent >/etc/sudoers.d/incus-web-user
      chmod 440 /etc/sudoers.d/incus-web-user

      if ! grep -q '/usr/local/bin' /home/agent/.bashrc 2>/dev/null; then
        cat >>/home/agent/.bashrc <<'EOF'

      export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
      cd /workspace 2>/dev/null || true
      EOF
      fi
      chown agent:agent /home/agent/.bashrc

      if ! runuser -u agent -- bash -lc 'command -v codex >/dev/null 2>&1'; then
        runuser -u agent -- bash -lc 'cd "$HOME" && curl -fsSL https://chatgpt.com/codex/install.sh | CODEX_NON_INTERACTIVE=1 sh'
      fi

      systemctl enable wetty.service
      systemctl enable tailscaled.service

      rm -rf /etc/incus-web /tmp/* /var/tmp/*
      rm -f /root/.bash_history /home/*/.bash_history
      apt-get clean
      rm -rf /var/lib/apt/lists/*
      find /var/log -type f -exec truncate -s 0 {} + 2>/dev/null || true
